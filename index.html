<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Wine — Báo Giá Sản Phẩm</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--wine:#8B1A2C;--wine-light:#C94A5A;--wine-dark:#5C0F1A;--gold:#B8860B;--bg:#FAFAF8;--card:#fff;--text:#1a1a1a;--muted:#6b7280;--border:#e5e7eb}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--wine);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.logo{display:flex;align-items:center;gap:10px;color:#fff}
.logo svg{width:28px;height:28px;fill:none;stroke:#fff;stroke-width:1.8}
.logo-text{font-size:18px;font-weight:600;letter-spacing:0.02em}
.logo-sub{font-size:11px;opacity:0.7;letter-spacing:0.06em}
#ws-badge{display:none;background:rgba(255,255,255,0.2);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px}
