<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--w:#8B1A2C;--g:#B8860B;--b:#e5e7eb;--m:#6b7280;--bg:#FAFAF8}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:#1a1a1a}
header{background:var(--w);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logo{color:#fff}.logo-t{font-size:17px;font-weight:700}.logo-s{font-size:10px;opacity:.7}
#wbg{display:none;background:rgba(255,255,255,.2);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--b);padding:0 16px;overflow-x:auto}
.tb{padding:11px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--m);border-bottom:2px solid transparent;white-space:nowrap}
.tb.a{color:var(--w);border-bottom-color:var(--w)}
.ct{padding:14px;max-width:1100px;margin:0 auto}
.tr{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tr input,.tr select{padding:8px 12px;font-size:13px;border:1px solid var(--b);border-radius:8px;background:#fff;flex:1;min-width:0}
.tr input:focus,.tr select:focus{outline:none;border-color:var(--w)}
.ps{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.p{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--b);background:#fff;color:var(--m);white-space:nowrap}
.p.a{background:var(--w);color:#fff;border-color:var(--w)}
.gd{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.cd{background:#fff;border:1px solid var(--b);border-radius:10px;padding:12px;cursor:pointer;transition:.15s}
.cd:hover{border-color:var(--w);transform:translateY(-1px);box-shadow:0 2px 8px rgba(139,26,44,.1)}
.cd.sel{border:2px solid var(--w)}
.ci{width:100%;height:130px;background:linear-gradient(135deg,#fdf2f4,#fdf8f9);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;overflow:hidden;position:relative}
.ci img{width:100%;height:100%;object-fit:contain;position:relative;z-index:1}
.fb{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:linear-gradient(135deg,#fdf2f4,#fdf8f9)}
.fb svg{width:32px;height:32px;fill:rgba(139,26,44,.15)}
.fb span{font-size:9px;color:#bbb}
.cbg{position:absolute;top:6px;right:6px;font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(139,26,44,.08);color:var(--w);font-weight:600;z-index:2}
.cn{font-size:11px;font-weight:600;margin-bottom:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:30px}
.cg{font-size:10px;color:var(--m);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ca{font-size:10px;color:#9ca3af}
.cpr{margin-top:7px;padding-top:7px;border-top:1px solid var(--b);font-size:11px;font-weight:600;color:var(--w)}
.dt{background:#fff;border:1px solid var(--b);border-radius:10px;padding:18px;margin-top:14px;display:none}
.dt.sh{display:block}
.dtp{display:flex;gap:16px;flex-wrap:wrap}
.dim{width:160px;min-width:160px;height:220px;background:linear-gradient(135deg,#fdf2f4,#fdf8f9);border-radius:8px;overflow:hidden;border:1px solid var(--b);display:flex;align-items:center;justify-content:center}
.dim img{width:100%;height:100%;object-fit:contain}
.dph{display:flex;flex-direction:column;align-items:center;gap:8px;color:#ccc;font-size:11px;text-align:center;padding:10px}
.dph svg{width:48px;height:48px;fill:rgba(139,26,44,.12)}
.dii{flex:1;min-width:180px}
.dn{font-size:16px;font-weight:700;margin-bottom:12px;line-height:1.4}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.ii{background:#f9fafb;border-radius:7px;padding:8px 10px}
.il{font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
.iv{font-size:12px;font-weight:600}
.pb{padding:10px 12px;background:rgba(139,26,44,.04);border-radius:7px;border:1px solid rgba(139,26,44,.12);margin-bottom:12px}
.pl{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.04em}
.pv{font-size:15px;font-weight:700;color:var(--w)}
.wl{margin-top:8px;display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--w);text-decoration:none;padding:4px 10px;border:1px solid rgba(139,26,44,.2);border-radius:5px}
.db{border-top:1px solid var(--b);padding-top:12px;margin-top:12px}
.db h4{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.dx{font-size:12px;line-height:1.7}
.kb{margin-top:14px;background:linear-gradient(135deg,rgba(184,134,11,.06),rgba(250,240,210,.3));border:1px solid rgba(184,134,11,.25);border-radius:8px;padding:12px 14px}
.kh{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.kt{font-size:12px;font-weight:600;color:var(--g)}
.ke{font-size:11px;color:var(--m);cursor:pointer;border:1px solid var(--b);padding:2px 8px;border-radius:4px;background:#fff}
.kc{font-size:12px;line-height:1.7}
.kta{width:100%;min-height:80px;font-size:12px;padding:8px;border:1px solid rgba(184,134,11,.3);border-radius:6px;background:#fff;resize:vertical;font-family:inherit;line-height:1.7;display:none}
.ksv{margin-top:6px;padding:5px 14px;background:var(--g);color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;display:none}
.ls{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px}
.li{width:56px;height:56px;background:rgba(139,26,44,.08);border-radius:50%;display:flex;align-items:center;justify-content:center}
.li svg{width:26px;height:26px;fill:none;stroke:var(--w);stroke-width:1.8}
.lt{font-size:16px;font-weight:600}
.lb{font-size:12px;color:var(--m);text-align:center;max-width:260px;line-height:1.6}
.linp{padding:9px 14px;border:1px solid var(--b);border-radius:7px;font-size:13px;width:220px;text-align:center;letter-spacing:.1em}
.linp:focus{outline:none;border-color:var(--w)}
.lbtn{padding:9px 28px;background:var(--w);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}
.lerr{font-size:11px;color:#dc2626;display:none}
.sec{margin-bottom:18px}
.sec h3{font-size:13px;font-weight:600;margin-bottom:9px}
.uz{border:2px dashed var(--b);border-radius:9px;padding:24px;text-align:center;cursor:pointer}
.uz:hover{border-color:var(--w)}
.uz p{font-size:12px;color:var(--m);margin-top:5px}
.uz b{color:var(--w)}
.km2{background:#f9fafb;border-radius:9px;padding:14px}
.km2 textarea{width:100%;min-height:100px;font-size:12px;padding:9px 11px;border:1px solid var(--b);border-radius:6px;background:#fff;resize:vertical;line-height:1.7;font-family:inherit;margin-bottom:9px}
.km2s{padding:7px 20px;background:var(--w);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.ts{font-size:11px;color:#16a34a;margin-left:8px;display:none}
.nr{text-align:center;padding:40px;color:var(--m);font-size:13px;grid-column:1/-1}
@media(max-width:600px){.ig{grid-template-columns:1fr}.dtp{flex-direction:column}.dim{width:100%;height:180px}.tr{flex-direction:column}}
